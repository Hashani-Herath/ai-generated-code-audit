name: CodeShield Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install CodeShield
        run: pip install codeshield

      - name: Run Security Scan
        run: codeshield scan .

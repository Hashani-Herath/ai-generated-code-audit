name: Semgrep

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # If you use Semgrep App, store your token in GitHub Secrets as SEMGREP_APP_TOKEN
      - name: Run Semgrep
        env:
          SEMGREP_APP_TOKEN: 5a2797ef494d748061c87a25b6e003f1891a0989f64e9b1759cc24695ab6423a
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep ci
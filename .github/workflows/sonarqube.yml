name: SonarQube Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: c0bf7495c8f09e2e186da495b629438cbb5968d5
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'ai-generated-code-audit' }}
            -Dsonar.projectName=${{ vars.SONAR_PROJECT_NAME || 'ai-generated-code-audit' }}
            -Dsonar.sources=Generated-Code
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/results/**,**/codeql-dbs/**,**/.git/**

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: c0bf7495c8f09e2e186da495b629438cbb5968d5
          SONAR_HOST_URL: https://sonarcloud.io
